services:
  microstock.api:
    image: ${DOCKER_REGISTRY-}microstockapi
    build:
      context: .
      dockerfile: src/Api/MicroStock.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081

  microstock.database:
    image: postgres:latest
    container_name: microstock.database
    environment:
      - POSTGRES_DB=microstock
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432

  microstock.seq:
    image: datalust/seq:latest
    container_name: microstock.seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - 5341:5341
      - 8081:80

  microstock.redis:
    image: redis:latest
    container_name: microstock.redis
    restart: always
    ports:
      - 6379:6379
